catalog:
  vite: npm:@voidzero-dev/vite-plus-core@0.1.21-alpha.7
  vite-plus: 0.1.21-alpha.7
  vitest: npm:@voidzero-dev/vite-plus-test@0.1.21-alpha.7
minimumReleaseAgeExclude:
  - vite-plus
  - '@voidzero-dev/*'
overrides:
  vite: 'catalog:'
  vitest: 'catalog:'
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
verifyDepsBeforeRun: install
